baseURL = 'https://www.htmltrust.org/'
languageCode = 'en-us'
title = 'HTMLTrust'
theme = 'ananke'

[module]
  [[module.imports]]
    path = "github.com/HTMLTrust/htmltrust-hugo"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = 'monokai'

[params]
  description = "Decentralized Trust and Verifiable Content on the Web"
  author = "Jason Grey"
  mainSections = ["posts"]
  background_color_class = "bg-dark-blue"
  show_reading_time = true

[params.htmltrust]
  keyid = "did:web:jason-grey.com"
  algorithm = "ed25519"

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 10

[[menus.main]]
  name = "Architecture"
  url = "/architecture/"
  weight = 20

[[menus.main]]
  name = "Use Cases"
  url = "/use-cases/"
  weight = 30

[[menus.main]]
  name = "FAQ"
  url = "/faq/"
  weight = 40

[[menus.main]]
  name = "GitHub"
  url = "https://github.com/HTMLTrust"
  weight = 50
