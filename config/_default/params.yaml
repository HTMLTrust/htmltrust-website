# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding (for people/profiles, use the author system in content/authors/)
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    name: "HTMLTrust"
    organization: "HTMLTrust"
    type: organization
    tagline: "Decentralized trust and verifiable content on the web"
    description: "HTMLTrust is a decentralized, standards-aligned framework for embedding cryptographic trust directly into HTML content. Authors sign blocks of HTML; browsers verify them locally; trust is a user-controlled, federated decision."
    social:
      twitter: ""

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # Color and visual design system
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    # Mode: 'light', 'dark', or 'system' (follows OS preference)
    mode: dark
    pack: "default"
    colors:
      primary: "teal"   # matches the deck's #4ca1af accent
      secondary: "amber"
      neutral: "slate"
    # Optional: Mode-specific color overrides
    colors_light: {}
    colors_dark: {}
    # Optional: Semantic surface color overrides
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # Font and text sizing
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    # Theme pack: name from data/fonts/
    pack: "modern"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # Spacing and shape tokens
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    # Border radius: 'none', 'sm', 'md', 'lg', or 'full'
    radius: "md"
    # Spacing density: 'compact', 'comfortable', or 'spacious'
    spacing: "spacious"
    # Avatar shape in author profiles
    avatar_shape: circle # circle | square | rounded

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Site header and navigation bar
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    # Header style variant
    style: navbar # navbar | navbar-simple | minimal
    # Stick to top on scroll
    sticky: true
    # Menu alignment
    align: center # left | center | right
    # Feature toggles
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: true
    # Call-to-action button
    cta:
      enable: false
      text: ""
      url: ""

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # Site footer
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    language_switcher: false
    text: 'Created by <a href="mailto:jason@jason-grey.com" class="underline">Jason Grey</a>. Source on <a href="https://github.com/HTMLTrust" class="underline">GitHub</a>.'

  # ────────────────────────────────────────────────────────────────────────────
  # COPYRIGHT
  # Legal notices and licensing
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    # Copyright notice - supports {year}, {name}, {license} placeholders
    notice: "© {year} {name}. This work is licensed under {license}"
    license:
      type: cc # cc | custom
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  # ────────────────────────────────────────────────────────────────────────────
  # SEO
  # Search engine optimization - overrides and technical settings
  # ────────────────────────────────────────────────────────────────────────────
  seo:
    # Browser tab title override (defaults to identity.name if not set)
    title: ""
    # For local_business identity type only
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    # AI/LLM crawler guidance (llms.txt)
    ai:
      allow:
        - /
      disallow: []
      note: "Guidance for AI crawlers - customize to match your public content."
      contact: ""

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # Content rendering and behavior
  # ────────────────────────────────────────────────────────────────────────────
  content:
    # Math rendering
    math:
      enable: false
    # Table of contents
    toc:
      enable: true
    # Reading time estimates
    reading_time:
      enable: true
    # Academic citations
    citations:
      style: apa # apa | mla | chicago | ieee

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    # Trending/suggested search terms
    suggestions: []
    # Quick action shortcuts in search modal
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: "" # giscus | disqus
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: "" # Google Analytics 4: G-XXXXXXXXXX
    google_tag_manager:
      container_id: "" # GTM-XXXXXXX
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: "" # e.g., https://github.com/username/repo
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006" # Go time format
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies (requires Netlify integration)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow # deny | sameorigin | allow - allow enables iframe embedding
    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging (hidden in production)
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left # top-left | top-right | bottom-left | bottom-right
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # Premium features and creator program (affiliates)
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    # Hide "Powered by HugoBlox" attribution
    # Requires: HugoBlox Premium to support HugoBlox via alternative means
    # Note: Even with Premium, you can keep this false to support open source!
    # Get Premium: https://hugoblox.com/premium
    hide_attribution: false

    # Affiliate referral code for rewards program
    # Join affiliate program: https://hugoblox.com/affiliates
    affiliate_code: ""

# ──────────────────────────────────────────────────────────────────────────────
# HTMLTRUST CONTENT SIGNING
# Site-level defaults consumed by github.com/HTMLTrust/htmltrust-hugo and the
# htmltrust-sign post-build tool. Individual pages opt in via front-matter
# `htmltrust.sign: true` and may add per-page `htmltrust.claims`.
# ──────────────────────────────────────────────────────────────────────────────
htmltrust:
  keyid: "did:web:www.htmltrust.org"
  algorithm: "ed25519"
