bio: |
  Jason has been building for the web since the early 1990s, with decades of work
  across digital and interactive media. Since the early 2000s he has worked on AI,
  search, generated content, and the semantic web. Recent work includes running
  jobs across Common Crawl's entire 10PB corpus and building search-and-context
  infrastructure at Kagi — domains where the trustworthiness of web content is a
  daily, practical concern. HTMLTrust is a response to that gap.
